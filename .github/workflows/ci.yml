name: CI

on: [push, pull_request]

env:
    NO_INTERACTION: 1
    TEST_TIMEOUT: 120
    LIBRABBITMQ_VERSION: master

jobs:
    tests:
        name: Tests
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php:
                    - '8.0'
                include:
                    - php: 7.4
                      env:
                          LIBRABBITMQ_VERSION: master
                    - php: 7.4
                      env:
                          LIBRABBITMQ_VERSION: v0.8.0
                    - php: 7.4
                      env:
                          LIBRABBITMQ_VERSION: v0.7.1

                    - php: 7.3
                      env:
                          LIBRABBITMQ_VERSION: master
                    - php: 7.3
                      env:
                          LIBRABBITMQ_VERSION: v0.8.0
                    - php: 7.3
                      env:
                          LIBRABBITMQ_VERSION: v0.7.1

                    - php: 7.1
                      env:
                          LIBRABBITMQ_VERSION: master

                    - php: 5.6
                      env:
                          LIBRABBITMQ_VERSION: master
        services:
            rabbitmq:
                image: rabbitmq:3-management

        steps:
            - name: Checkout
              uses: actions/checkout@v2

            - name: Setup cmake
              uses: jwlawson/actions-setup-cmake@v1.8

            - name: Install Rabbitmq version
              run: sudo ./provision/install_rabbitmq-c.sh ${{ env.LIBRABBITMQ_VERSION }}

            - run: sh -c "make test | tee result.txt"

            - run: php -n -c './tmp-php.ini' -d "extension_dir=./modules/" -d "extension=amqp.so" benchmark.php

            - run: sh test-report.sh
